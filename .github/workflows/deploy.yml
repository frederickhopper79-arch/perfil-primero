name: CI/CD — Perfil Primero

# DESACTIVADO EN AUTOMÁTICO (solo ejecución manual) hasta configurar los
# GitHub Secrets: FIREBASE_SERVICE_ACCOUNT y las NEXT_PUBLIC_* (ver DEBT-003).
# ESLint ya está configurado (.eslintrc.json) y el lint pasa.
# Los despliegues se hacen manualmente con `firebase deploy` por ahora.
# Para reactivar en cada push: descomentar el bloque `push`/`pull_request`.
on:
  workflow_dispatch:
  # push:
  #   branches: [master]
  # pull_request:
  #   branches: [master]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java (emulador Firestore)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Cloud Functions dependencies
        run: cd functions && npm ci

      # ── Quality gates ─────────────────────────────────────────────
      - name: Lint
        run: pnpm lint

      - name: Build Cloud Functions
        run: cd functions && npm run build

      - name: Firestore rules tests
        run: npm run test:rules

      - name: Build Next.js static export
        run: pnpm build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}

      # ── Deploy hosting (con canal de preview en PRs) ──────────────
      - name: Deploy hosting (Production)
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: perfil-primero
          channelId: live

      - name: Deploy hosting (Preview de PR)
        if: github.event_name == 'pull_request'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: perfil-primero

      # ── Deploy functions + reglas + storage (solo en master) ──────
      # Requiere que la service account tenga los roles: Cloud Functions Admin,
      # Service Account User, Firebase Rules Admin.
      - name: Deploy functions, rules y storage (Production)
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          npx firebase-tools deploy \
            --only functions,firestore:rules,storage \
            --project perfil-primero \
            --non-interactive --force
          rm -f "$RUNNER_TEMP/sa.json"
